name: gitleaks

# Catches secrets that slip past local pre-commit (or commits made with
# `--no-verify`). Runs on every PR and every push to main.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    name: Scan for hard-coded secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Required so gitleaks can scan the entire commit history, not just
          # the diff — past leaks (e.g. the rotated Google Maps key) stay
          # surfaced until the history is rewritten.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin to the same version used by the local pre-commit hook so
          # local + CI behaviour stay in sync.
          GITLEAKS_VERSION: 8.30.1
